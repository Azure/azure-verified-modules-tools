name: ci

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ci (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Install build prerequisites
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Module -ListAvailable -Name 'Microsoft.PowerShell.PSResourceGet')) {
              Install-Module -Name 'Microsoft.PowerShell.PSResourceGet' -Scope CurrentUser -Force -AllowClobber
          }
          Import-Module 'Microsoft.PowerShell.PSResourceGet' -Force
          foreach ($pkg in @(
              @{ Name = 'InvokeBuild';        Version = '[5.11.0,)' },
              @{ Name = 'Pester';             Version = '[5.5.0,)'  },
              @{ Name = 'PSScriptAnalyzer';   Version = '[1.21.0,)' }
          )) {
              Install-PSResource @pkg -Scope CurrentUser -TrustRepository
          }

      - name: PowerShell environment
        shell: pwsh
        run: |
          $PSVersionTable | Format-List
          Get-Module -ListAvailable -Name InvokeBuild, Pester, PSScriptAnalyzer |
              Select-Object Name, Version | Format-Table

      - name: Run ci task
        shell: pwsh
        run: ./build.ps1 ci

      - name: Publish test results
        # Upload the NUnit result XML even when the ci task fails, so the
        # results are downloadable per run and consumed by the
        # publish-test-results companion workflow.
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results-${{ matrix.os }}
          path: out/test-results/*.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Upload event file
        # The publish-test-results companion workflow runs in the privileged
        # workflow_run context and needs the triggering event payload to map
        # results back to the pull request. Upload it once (artifact names must
        # be unique within a run), so gate to a single matrix leg.
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: event-file
          path: ${{ github.event_path }}
          if-no-files-found: warn
          retention-days: 7
