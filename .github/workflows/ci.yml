name: ci

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: ci (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install build prerequisites
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Module -ListAvailable -Name 'Microsoft.PowerShell.PSResourceGet')) {
              Install-Module -Name 'Microsoft.PowerShell.PSResourceGet' -Scope CurrentUser -Force -AllowClobber
          }
          Import-Module 'Microsoft.PowerShell.PSResourceGet' -Force
          foreach ($pkg in @(
              @{ Name = 'InvokeBuild';        Version = '[5.11.0,)' },
              @{ Name = 'Pester';             Version = '[5.5.0,)'  },
              @{ Name = 'PSScriptAnalyzer';   Version = '[1.21.0,)' }
          )) {
              Install-PSResource @pkg -Scope CurrentUser -TrustRepository
          }

      - name: PowerShell environment
        shell: pwsh
        run: |
          $PSVersionTable | Format-List
          Get-Module -ListAvailable -Name InvokeBuild, Pester, PSScriptAnalyzer |
              Select-Object Name, Version | Format-Table

      - name: Run ci task
        shell: pwsh
        run: ./build.ps1 ci

      - name: Upload test results
        # Upload the NUnit result XML even when the ci task fails, so the results
        # are downloadable per run and consumed by the `report` job below, which
        # aggregates every matrix leg into a single pull-request report.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: out/test-results/*.xml
          if-no-files-found: warn
          retention-days: 7

  report:
    name: Publish test results
    needs: build
    # Run even when a build leg fails (so red tests still get reported), but not
    # when the run was cancelled. Aggregates every matrix leg into one report.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: write          # create the Checks-tab test report
      pull-requests: write   # post / update the results comment
      contents: read
    steps:
      - name: Download test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: test-results-*
          path: artifacts

      - name: Publish test results
        # Renders a job summary on this run, plus a Checks-tab entry and a
        # pull-request comment when the token has write access (same-repo PRs).
        # On fork PRs the token is read-only, so it degrades to the job summary
        # only; action_fail defaults to false, so reporting never reds the build.
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        if: ${{ !cancelled() }}
        with:
          check_name: Test results (ci)
          files: artifacts/**/*.xml
          report_individual_runs: "true"
