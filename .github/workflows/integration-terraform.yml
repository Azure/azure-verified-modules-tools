name: integration-terraform

# Real-binary Terraform integration smoke. Runs the wired `avm pre-commit` and
# `avm pr-check` chains end to end against the on-disk fixture modules using the
# actual pinned tools (terraform, terraform-docs, tflint, conftest, mapotf)
# downloaded into an isolated AVM_HOME -- not the stub launchers the Integration
# tier uses. The `smoke` build task drives the Pester suite tagged 'Smoke'.
#
# Kept OUT of the push / pull_request `ci` gate on purpose: it needs real
# network (tool + provider downloads) and is slower. Trigger it on demand or on
# the weekly schedule.
#
# NOTE (schedule): scheduled runs only fire from the repository default branch
# (`main`). Until this file is merged to `main`, use the `workflow_dispatch`
# button (which runs from whichever branch you pick in the UI).

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 05:23 UTC. Off-peak to avoid the top-of-hour runner crunch.
    - cron: '23 5 * * 1'

permissions:
  id-token: write   # Azure OIDC login
  contents: read

concurrency:
  # Never cancel an in-flight integration run just because another was queued.
  group: integration-terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    name: smoke (${{ matrix.fixture }} on ${{ matrix.os }})
    strategy:
      # Cover every test module on every OS independently; one red leg must not
      # cancel the others (we want the full drift picture in one run).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        fixture:
          - terraform-azure-avm-res-mock
          - terraform-azurerm-avm-res-mock
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    env:
      # The smoke suite reads AVM_SMOKE_FIXTURE at discovery time and generates a
      # Context for only the named module, so each matrix leg exercises exactly
      # one test module.
      AVM_SMOKE_FIXTURE: ${{ matrix.fixture }}
      # OIDC plumbing for `azure/login`. The `test` step today is validate-only
      # (`terraform init -backend=false` + `terraform validate -json`) so it does
      # not actually need Azure auth, but we wire login per the same pattern as
      # avm-terraform-governance so the chain is ready when test grows to plan.
      ARM_USE_OIDC: 'true'
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AVM tool + provider cache
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # runner.temp is not available in job-level env, so resolve the cache
          # dirs here and export them to GITHUB_ENV for later steps.
          $avmHome = Join-Path $env:RUNNER_TEMP 'avm-home'
          $tfCache = Join-Path $env:RUNNER_TEMP 'tf-plugin-cache'
          New-Item -ItemType Directory -Force -Path $avmHome, $tfCache | Out-Null
          "AVM_HOME=$avmHome"            | Out-File -FilePath $env:GITHUB_ENV -Append
          "TF_PLUGIN_CACHE_DIR=$tfCache" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Exclude AVM tools from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # mapotf's Go binary is a known Defender false positive ("virus or
          # potentially unwanted software") and is quarantined at exec time on
          # Windows. GitHub-hosted Windows runners let us add an exclusion (an
          # un-elevated dev box cannot), so CI gets a real pass instead of a skip.
          Add-MpPreference -ExclusionPath $env:AVM_HOME -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess 'mapotf.exe' -ErrorAction SilentlyContinue

      - name: Azure login (OIDC)
        # Only when the federated-identity vars are provisioned (skips cleanly on
        # forks). The federated credential subject must cover the ref this runs
        # on: schedule runs on refs/heads/main; workflow_dispatch runs on the ref
        # selected in the UI. Add the matching FC subject if login fails.
        if: ${{ vars.ARM_CLIENT_ID != '' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Install build prerequisites
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Module -ListAvailable -Name 'Microsoft.PowerShell.PSResourceGet')) {
              Install-Module -Name 'Microsoft.PowerShell.PSResourceGet' -Scope CurrentUser -Force -AllowClobber
          }
          Import-Module 'Microsoft.PowerShell.PSResourceGet' -Force
          foreach ($pkg in @(
              @{ Name = 'InvokeBuild'; Version = '[5.11.0,)' },
              @{ Name = 'Pester';      Version = '[5.5.0,)'  }
          )) {
              Install-PSResource @pkg -Scope CurrentUser -TrustRepository
          }

      - name: Run smoke task
        shell: pwsh
        run: ./build.ps1 smoke
